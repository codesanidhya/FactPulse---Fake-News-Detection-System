<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FactPulse Search</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:linear-gradient(180deg,#0f172a,#020617);color:white;padding:20px}

/* LOGO */
.logo{text-align:center;font-size:48px;font-weight:bold;background:linear-gradient(90deg,#38bdf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:20px}

/* SEARCH */
.search-box{display:flex;justify-content:center;margin-bottom:25px}
.search-box input{width:420px;padding:14px 20px;border-radius:40px;border:none;background:#1e293b;color:white}
.search-box button{margin-left:10px;padding:12px 18px;border:none;border-radius:30px;background:linear-gradient(90deg,#38bdf8,#6366f1);color:white;cursor:pointer}

/* RESULT CARDS */
.card{background:#1e293b;padding:18px;margin:12px auto;width:70%;border-radius:12px;cursor:pointer;transition:.35s}
.card:hover{transform:translateY(-6px) scale(1.02)}

/* MODAL */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);animation:fadeBg .35s ease}
.modal-content{background:linear-gradient(180deg,#0f172a,#020617);margin:2% auto;padding:25px;width:80%;height:90%;overflow-y:auto;border-radius:16px;color:white;box-shadow:0 20px 60px rgba(0,0,0,.7);animation:popup .35s ease}
@keyframes popup{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes fadeBg{from{opacity:0}to{opacity:1}}

.close{float:right;font-size:24px;cursor:pointer}
.fullscreen{position:fixed;top:0;left:0;width:100%;height:100%;margin:0;border-radius:0}

/* GRID */
.dashboard-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;margin-top:20px}

/* CARDS */
.d-card{background:rgba(30,41,59,.75);padding:20px;border-radius:14px;backdrop-filter:blur(12px);box-shadow:0 10px 25px rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.05)}

/* BUTTON */
.trendy-btn{padding:10px 18px;border:none;border-radius:30px;background:linear-gradient(90deg,#38bdf8,#6366f1);color:white;cursor:pointer;font-weight:600;transition:.35s;box-shadow:0 0 20px rgba(99,102,241,.6)}
.trendy-btn:hover{transform:scale(1.08);box-shadow:0 0 35px rgba(56,189,248,.9)}

/* SENTIMENT */
.sentiment-badge{padding:6px 12px;border-radius:8px;color:white;font-weight:bold}
.pos{background:#2ecc71}.neg{background:#ff3b3b}.neu{background:#f1c40f;color:black}

/* SKELETON */
.skeleton{height:14px;background:linear-gradient(90deg,#1e293b,#334155,#1e293b);background-size:200% 100%;animation:skeleton 1.2s infinite;border-radius:6px;margin:8px 0}
@keyframes skeleton{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* CONF BAR */
.conf-bar{height:10px;border-radius:10px;background:#1e293b;margin-top:10px;overflow:hidden}
.conf-fill{height:100%;background:linear-gradient(90deg,#2ecc71,#ff3b3b)}

/* GAUGE GLOW */
#gaugeChart{filter:drop-shadow(0 0 18px rgba(56,189,248,.6))}

/* REDDIT ITEM */
.reddit-item{padding:10px;margin-bottom:10px;background:#1e293b;border-radius:8px;cursor:pointer;transition:.25s}
.reddit-item:hover{background:#334155;transform:translateX(4px)}
</style>
</head>

<body>

<div class="logo">FactPulse</div>

<form class="search-box" method="POST" action="/search">
<input type="text" name="topic" required placeholder="Search news topic...">
<button type="submit">Search</button>
</form>

<hr>

{% for n in news_data %}
<div class="card"
data-title='{{ n.title|tojson }}'
data-desc='{{ n.desc|tojson }}'
data-url='{{ n.url|tojson }}'
data-mood='{{ n.mood|tojson }}'
data-fake='{{ n.fake_label|tojson }}'
data-prob='{{ n.fake_prob|tojson }}'
onclick="openDashboardFromCard(this)">
<h3>{{n.title}}</h3>
<p>{{n.mood}} | {{n.fake_label}} ({{n.fake_prob}}%)</p>
</div>
{% endfor %}

<div id="modal" class="modal">
<div id="modalContent" class="modal-content">

<span class="close" onclick="closeModal()">&times;</span>
<button class="trendy-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

<h2 id="d_title"></h2>
<a id="d_url" target="_blank"><button class="trendy-btn">📖 Read Article</button></a>

<div class="dashboard-grid">
<div class="d-card"><h3>AI Summary</h3><p id="d_summary"></p></div>
<div class="d-card"><h3>AI Explanation</h3><p id="d_explain"></p></div>
<div class="d-card"><h3>Sentiment</h3><div id="sentimentBadge" class="sentiment-badge">Neutral</div></div>

<div class="d-card">
<h3>Fake Confidence Gauge</h3>
<div id="gaugeLabel" style="text-align:center;font-size:22px;font-weight:700;margin-bottom:8px"></div>
<div style="width:260px;margin:auto"><canvas id="gaugeChart"></canvas></div>
<div class="conf-bar"><div id="confFill" class="conf-fill"></div></div>
</div>

<div class="d-card"><h3>Reddit Discussions</h3><div id="d_reddit" style="max-height:170px;overflow-y:auto"></div></div>
</div>
</div>
</div>

<script>
let gauge;

/* ⭐ CRITICAL FIX — bridge function */
function openDashboardFromCard(el){
openDashboard(
JSON.parse(el.dataset.title),
JSON.parse(el.dataset.desc),
JSON.parse(el.dataset.url),
JSON.parse(el.dataset.mood),
JSON.parse(el.dataset.fake),
JSON.parse(el.dataset.prob)
);
}

function openDashboard(title, desc, url, mood, fake, prob){
modal.style.display="block";

desc = desc || "";
url = url || "#";
prob = Number(prob) || 0;

d_title.innerText=title;
d_url.href=url;

d_summary.innerHTML="<div class='skeleton'></div><div class='skeleton'></div>";
d_explain.innerHTML="<div class='skeleton'></div>";
d_reddit.innerHTML="Loading reddit feed...";

const badge=document.getElementById("sentimentBadge");
badge.innerText=mood;
badge.className="sentiment-badge "+(mood==="Positive"?"pos":mood==="Negative"?"neg":"neu");

const real=prob;
const fakePct=100-prob;
if(real>=50){
gaugeLabel.innerText=`Real: ${real}%`;
gaugeLabel.style.color="#2ecc71";
}else{
gaugeLabel.innerText=`Fake: ${fakePct}%`;
gaugeLabel.style.color="#ff3b3b";
}

fetch("/details",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({title,desc,fake_label:fake})})
.then(r=>r.json())
.then(data=>{d_summary.innerText=data.summary;d_explain.innerText=data.explanation});

fetch("/reddit",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({title})})
.then(r=>r.json())
.then(posts=>{
if(posts.length===0){d_reddit.innerHTML="No reddit discussions found";return;}
d_reddit.innerHTML="";
posts.forEach(p=>{
d_reddit.innerHTML+=`<div class="reddit-item" onclick="window.open('${p.url}','_blank')">${p.text}</div>`;
});
});

confFill.style.width=prob+"%";
drawGauge(prob);
}

function drawGauge(target){
let value=0;
const needlePlugin={id:'needle',afterDatasetDraw(chart){
const {ctx}=chart;
const meta=chart.getDatasetMeta(0);
const cx=meta.data[0].x;
const cy=meta.data[0].y;
const r=meta.data[0].outerRadius;
const angle=Math.PI+(value/100)*Math.PI;
ctx.save();ctx.translate(cx,cy);ctx.rotate(angle);
ctx.beginPath();ctx.moveTo(0,-2);ctx.lineTo(r,0);ctx.lineTo(0,2);ctx.fill();ctx.restore();
ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);ctx.fill();
}};
if(gauge) gauge.destroy();
gauge=new Chart(gaugeChart,{type:'doughnut',data:{datasets:[{data:[20,20,20,20,20],backgroundColor:["#2ecc71","#1abc9c","#f1c40f","#e67e22","#ff3b3b"],borderWidth:0}]},options:{rotation:270,circumference:180,cutout:"70%",plugins:{legend:{display:false}}},plugins:[needlePlugin]});
const anim=setInterval(()=>{value+=2;if(value>=target){value=target;clearInterval(anim);}gauge.update();},10);
}

function closeModal(){modal.style.display="none"}
function toggleFullscreen(){modalContent.classList.toggle("fullscreen")}
</script>

</body>
</html>
